<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FEM Ring Game</title>
  <link data-trunk rel="css" href="style.css">
  <link data-trunk rel="copy-dir" href="textures">
</head>
<body>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div id="info">
    <b>A/Left</b> move left | <b>D/Right</b> move right | <b>Space</b> charge jump (hold & release)
  </div>
  <div id="status">
    <div>FPS: <span id="fps">0</span></div>
    <div>Charge: <span id="charge">0</span>%</div>
  </div>

  <link data-trunk rel="rust" data-wasm-opt="z" />
</body>
</html>
